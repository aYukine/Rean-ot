services:
  # ──────────────────────────────────────────────
  # NestJS Backend
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./rean-ot-backend
      dockerfile: Dockerfile
    container_name: reanot-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./rean-ot-backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - reanot-network

  # ──────────────────────────────────────────────
  # Vue 3 Frontend (served via Nginx)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./rean-ot-frontend
      dockerfile: Dockerfile
    container_name: reanot-frontend
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - backend
    networks:
      - reanot-network

  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: reanot-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: reanot
      POSTGRES_PASSWORD: reanot_secret
      POSTGRES_DB: reanot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reanot -d reanot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reanot-network

  # ──────────────────────────────────────────────
  # Redis (Caching, Sessions, Real-time Pub/Sub)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: reanot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass reanot123
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "reanot123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reanot-network

  # ──────────────────────────────────────────────
  # MinIO (S3-compatible file storage for videos)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: reanot-minio
    restart: unless-stopped
    ports:
      - "9002:9000"   # API (9000 taken by sonarqube)
      - "9003:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reanot-network

  # ──────────────────────────────────────────────
  # LiveKit (Live video streaming & classes)
  # ──────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: reanot-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"       # HTTP / WebSocket
      - "7881:7881"       # RTC over TCP
      - "7882:7882/udp"   # RTC over UDP
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - reanot-network

  # ──────────────────────────────────────────────
  # Mailhog (Email testing - signup, booking, receipts)
  # ──────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: reanot-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP server (backend sends emails here)
      - "8025:8025"   # Web UI to view emails
    networks:
      - reanot-network

  # ──────────────────────────────────────────────
  # Elasticsearch (Search courses, teachers)
  # ──────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: reanot-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - reanot-network

  # ──────────────────────────────────────────────
  # Nginx Reverse Proxy (Single entry point)
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: reanot-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - reanot-network

  # ──────────────────────────────────────────────
  # RabbitMQ (Background jobs: emails, video processing)
  # ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: reanot-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: reanot
      RABBITMQ_DEFAULT_PASS: reanot_rabbit
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - reanot-network

  # ──────────────────────────────────────────────
  # Prometheus (Metrics collection & monitoring)
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: reanot-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - reanot-network

  # ──────────────────────────────────────────────
  # Grafana (Dashboard & visualization)
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: reanot-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: reanot_grafana
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - reanot-network

  # ──────────────────────────────────────────────
  # RedisInsight (Redis browser UI)
  # ──────────────────────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: reanot-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      - redis
    networks:
      - reanot-network

  # ──────────────────────────────────────────────
  # pgAdmin (Database management UI)
  # ──────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: reanot-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@reanot.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - db
    networks:
      - reanot-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  elasticsearch_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  reanot-network:
    driver: bridge
